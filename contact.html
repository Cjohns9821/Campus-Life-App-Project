<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>Campus Life App - Contact</title>
</head>

<body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <a class="navbar-brand" href="index.html">Campus Life</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                <li class="nav-item"><a class="nav-link" href="announcements.html">Announcements</a></li>
                <li class="nav-item active"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contact Page Header -->
    <div class="container mt-5">
        <h1>Contact Us</h1>
        <p class="lead">Have questions or feedback? Send us a message!</p>

        <!-- Contact Form (JS will handle submission) -->
        <form id="contactForm" class="mt-4">
            <!-- Name Field -->
            <div class="form-group">
                <label for="nameInput">Your Name</label>
                <input type="text" id="nameInput" class="form-control" placeholder="Enter your name" required>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="emailInput">Your Email</label>
                <input type="email" id="emailInput" class="form-control" placeholder="Enter your email" required>
            </div>

            <!-- Message Field -->
            <div class="form-group">
                <label for="messageInput">Your Message</label>
                <textarea id="messageInput" class="form-control" rows="5" placeholder="Type your message here" required></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-success">Send Message</button>
        </form>

        <!-- Placeholder for JS confirmation message -->
        <div id="contactResponse" class="mt-4"></div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 Campus Life App. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <!-- Your JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
