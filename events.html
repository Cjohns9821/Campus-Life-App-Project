<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>Events - Campus Life App</title>
</head>
<body>
    <!-- Navigation bar connecting to all pages -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <a class="navbar-brand" href="index.html"> Campus Life</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item active"><a class="nav-link" href="events.html">Events</a></li>
                <li class="nav-item"><a class="nav-link" href="announcements.html">Announcements</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Campus Events</h1>
        <p class="lead">Discover and register for upcoming campus activities</p>

        <!-- Search and Filter Section -->
        <div class="row mb-4">
            <div class="col-md-6">
                <!-- Real-time search input with event listener -->
                <input type="text" class="form-control" id="searchInput" placeholder="Search events by name...">
            </div>
            <div class="col-md-6">
                <!-- Category filter dropdown with change event handler -->
                <select class="form-control" id="categoryFilter" onchange="filterEventsByCategory()">
                    <option value="">All Categories</option>
                    <option value="sports"> Sports</option>
                    <option value="academic"> Academic</option>
                    <option value="social"> Social</option>
                    <option value="cultural"> Cultural</option>
                </select>
            </div>
        </div>

        <!-- Event Cards Container - dynamically populated by JavaScript -->
        <div id="eventsContainer" class="row">
            <!-- Event cards will be rendered here -->
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2026 Campus Life App. All rights reserved.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
